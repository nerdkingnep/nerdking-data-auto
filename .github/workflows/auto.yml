name: Daily Data Automation

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 클라우드플레어 우회 라이브러리 설치
      run: pip install cloudscraper

    - name: 파이썬 수집 코드 실행
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python main.py

    - name: 새로 수집된 데이터 깃허브에 영구 저장
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add musinsa_trends.json
        git commit -m "Auto-update: 데일리 데이터 수집 완료" || exit 0
        git push
